<!DOCTYPE html>
<html lang="id">
<head>
    <link rel="manifest" href="manifest.json">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Werewolf Moderator Tools</title>
    <style>
        /* CSS - TEMA WEREWOLF DARK */
        :root {
            --dark-bg: #0a0a0a;
            --card-bg: #1a1a1a;
            --accent-red: #cc0000;
            --gold: #d4af37;
            --text: #e0e0e0;
            --warga: #3498db;
            --wolf: #e74c3c;
            --netral: #9b59b6;
        }

        body {
            background-color: var(--dark-bg);
            color: var(--text);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
        }

        .app-container {
            width: 100%;
            max-width: 500px;
            background: #121212;
            min-height: 100vh;
            box-shadow: 0 0 30px rgba(0,0,0,1);
            position: relative;
            padding-bottom: 80px;
        }

        /* Navigasi Atas */
        .main-nav {
            display: flex;
            background: #000;
            padding: 10px;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 2px solid var(--accent-red);
        }

        .main-nav button {
            flex: 1;
            padding: 15px 5px;
            background: transparent;
            border: none;
            color: #666;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            font-size: 0.9rem;
            letter-spacing: 1px;
        }

        .main-nav button.active {
            color: var(--accent-red);
            text-shadow: 0 0 10px var(--accent-red);
        }

        .btn-gacha-small {
            flex: 0.4 !important;
            font-size: 1.2rem !important;
            border-left: 1px solid #333 !important;
        }

        /* Halaman */
        .page {
            display: none;
            padding: 20px;
            animation: fadeIn 0.4s;
        }

        .page.active { display: block; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h2 { border-left: 4px solid var(--accent-red); padding-left: 10px; margin-bottom: 20px; font-size: 1.2rem; }

        /* Badge Angka Jumlah Pemain Pendaftaran */
        .judul-wrapper {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .judul-wrapper h2 {
            margin-bottom: 0;
        }

        .count-badge {
            background: #222;
            color: var(--gold);
            border: 1px solid var(--gold);
            font-size: 0.85rem;
            font-weight: bold;
            padding: 2px 9px;
            border-radius: 20px;
            min-width: 14px;
            text-align: center;
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.2);
            display: inline-block;
        }

        /* Input Pemain */
        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        input[type="text"] {
            flex: 1;
            background: #222;
            border: 1px solid #444;
            color: white;
            padding: 10px;
            border-radius: 5px;
        }

        .btn-add {
            background: var(--accent-red);
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
            font-weight: bold;
        }

        /* List Styling */
        ul { list-style: none; padding: 0; }
        .item-row {
            background: var(--card-bg);
            margin-bottom: 10px;
            padding: 15px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #333;
        }

        .item-row .role-badge {
            background: #333;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.8rem;
            color: var(--gold);
        }

        /* Karakter Tab */
        .role-category h3 {
            font-size: 0.9rem;
            margin: 20px 0 10px 0;
            color: #888;
        }

        .role-card {
            background: #1a1a1a;
            padding: 12px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            border-left: 4px solid var(--accent-red);
        }

        .controls { display: flex; align-items: center; gap: 10px; }
        
        .qty-input {
            width: 45px;
            background: #000;
            border: 1px solid #444;
            color: white;
            text-align: center;
            padding: 5px;
            border-radius: 4px;
        }

        .btn-toggle {
            padding: 6px 12px;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            width: 50px;
        }

        .btn-on { background: #2ecc71; color: white; }
        .btn-off { background: #c0392b; color: white; }

        /* Gacha Page */
        .gacha-container {
            text-align: center;
            margin-top: 50px;
        }

        #gacha-display {
            font-size: 2.5rem;
            height: 150px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
            border: 2px solid var(--gold);
            border-radius: 15px;
            margin: 30px 0;
            color: var(--gold);
            text-shadow: 0 0 15px var(--accent-red);
            font-weight: bold;
        }

        #btn-go {
            width: 80%;
            padding: 20px;
            font-size: 1.5rem;
            background: var(--accent-red);
            color: white;
            border: none;
            border-radius: 50px;
            box-shadow: 0 0 20px rgba(204, 0, 0, 0.4);
            cursor: pointer;
            font-weight: bold;
        }

        .delete-btn {
            background: transparent;
            border: 1px solid #555;
            color: #888;
            border-radius: 4px;
            cursor: pointer;
        }

        /* Status Saklar Hidup Mati di Mode Play */
        .btn-status {
            padding: 6px 10px;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            font-size: 0.75rem;
            cursor: pointer;
            width: 65px;
            text-align: center;
        }
        .status-alive { background: #2ecc71; color: #000; }
        .status-dead { background: #e74c3c; color: #fff; }

        /* ====== SAKLAR NOTIFIKASI BERSENI (CUSTOM TOAST) ====== */
        #custom-toast {
            position: fixed;
            top: -100px;
            left: 50%;
            transform: translateX(-50%);
            width: 85%;
            max-width: 400px;
            padding: 15px 20px;
            border-radius: 10px;
            color: #fff;
            font-weight: 500;
            font-size: 0.9rem;
            line-height: 1.4;
            z-index: 9999;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
            display: flex;
            align-items: center;
            gap: 12px;
            transition: top 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.3s;
            opacity: 0;
            border-left: 5px solid transparent;
        }

        #custom-toast.show {
            top: 25px;
            opacity: 1;
        }

        .toast-success { background: #15281e; border: 1px solid #2ecc71; border-left: 5px solid #2ecc71; box-shadow: 0 0 20px rgba(46, 204, 113, 0.2); }
        .toast-danger { background: #2c1515; border: 1px solid #e74c3c; border-left: 5px solid #e74c3c; box-shadow: 0 0 20px rgba(231, 76, 60, 0.2); }
        .toast-info { background: #1a1a1a; border: 1px solid #d4af37; border-left: 5px solid #d4af37; box-shadow: 0 0 20px rgba(212, 175, 55, 0.2); }
    </style>
</head>
<body>

<div id="custom-toast">
    <span id="toast-icon"></span>
    <span id="toast-message"></span>
</div>

<div class="app-container">
    <nav class="main-nav">
        <button onclick="showPage('pemain')" id="tab-pemain">PEMAIN</button>
        <button onclick="showPage('karakter')" id="tab-karakter">KARAKTER</button>
        <button onclick="showPage('play')" id="tab-play" style="color: var(--warga); font-weight: bold;">▶ PLAY!</button>
        <button onclick="showPage('gacha')" class="btn-gacha-small">🎲 GACHA</button>
    </nav>

    <section id="page-pemain" class="page active">
        <div class="judul-wrapper">
            <h2>Pendaftaran Pemain</h2>
            <div id="total-pemain-badge" class="count-badge">0</div>
        </div>
        
        <div class="input-group">
            <input type="text" id="input-nama" placeholder="Masukkan nama pemain...">
            <button class="btn-add" onclick="tambahPemain()">TAMBAH</button>
            <button onclick="resetRolePemain()" style="background: var(--accent-red); color: white; border: none; padding: 10px 15px; border-radius: 5px; font-weight: bold; cursor: pointer;">RESET</button>
        </div>
        <ul id="list-pemain"></ul>
    </section>

    <section id="page-karakter" class="page">
        <h2>Daftar Peran</h2>
        <div id="total-peran-aktif" style="background: #222; padding: 10px; border-radius: 5px; margin-bottom: 15px; border: 1px solid var(--gold); color: var(--gold); font-weight: bold; text-align: center;">
            Total Peran Aktif: 0
        </div>
        <div class="role-category">
            <h3 style="color: var(--warga)">WARGA</h3>
            <div id="warga-list"></div>
        </div>
        <div class="role-category">
            <h3 style="color: var(--wolf)">WEREWOLF</h3>
            <div id="wolf-list"></div>
        </div>
        <div class="role-category">
            <h3 style="color: var(--netral)">NETRAL</h3>
            <div id="netral-list"></div>
        </div>
    </section>

    <section id="page-gacha" class="page">
        <div class="gacha-container">
            <h2 id="gacha-target-name">Siapa selanjutnya?</h2>
            <div id="gacha-display">TAP GO!</div>
            <button id="btn-go" onclick="toggleGacha()">GO!</button>
            <div id="role-detail-box" style="margin-top: 20px; padding: 15px; background: #1a1a1a; border-radius: 10px; display: none; border: 1px solid #333;">
                <h3 id="detail-role-name" style="color: var(--gold); margin-top: 0;"></h3>
                <p id="detail-role-desc" style="font-size: 0.9rem; color: #bbb; line-height: 1.4;"></p>
            </div>
            <p id="gacha-progress" style="margin-top: 20px; font-size: 0.8rem; color: #666;"></p>
        </div>
    </section>

    <section id="page-play" class="page">
        <div id="play-setup" style="text-align: center; margin-top: 50px;">
            <h2>Siap Memulai Permainan?</h2>
            <p style="color: #888;">Pastikan semua peran sudah dibagikan.</p>
            <button onclick="mulaiPermainan()" style="background: #2ecc71; color: white; border: none; padding: 15px 30px; border-radius: 50px; font-weight: bold; cursor: pointer; font-size: 1.2rem;">MULAI HARI 1</button>
        </div>

        <div id="game-controller" style="display: none;">
            <div style="display: flex; justify-content: space-between; align-items: center; background: #000; padding: 10px 15px; border-radius: 8px; border: 1px solid #333; margin-bottom: 20px;">
                <div style="display: flex; flex-direction: column; gap: 2px;">
                    <span id="game-phase" style="color: var(--gold); font-weight: bold; letter-spacing: 1px; font-size: 0.95rem;">PAGI HARI</span>
                    <span id="live-player-count" style="color: #2ecc71; font-size: 0.75rem; font-weight: 500;">Sisa Hidup: 0</span>
                </div>
                <span id="game-timer" style="font-family: monospace; font-size: 1.5rem; color: var(--accent-red); font-weight: bold;">05:00</span>
            </div>

            <div id="game-notif" style="background: #1a1a1a; padding: 20px; border-radius: 10px; border-left: 5px solid var(--warga); margin-bottom: 20px;">
                <p id="notif-text" style="margin: 0; font-size: 1.1rem; line-height: 1.4;"></p>
            </div>

            <div id="game-action-area"></div>

            <div style="margin-top: 30px; display: flex; gap: 10px;">
                <button id="btn-prev-phase" onclick="gamePrev()" style="flex: 1; padding: 12px; background: #333; color: white; border: none; border-radius: 5px; cursor: pointer;">KEMBALI</button>
                <button id="btn-next-phase" onclick="gameNext()" style="flex: 2; padding: 12px; background: var(--accent-red); color: white; border: none; border-radius: 5px; font-weight: bold; cursor: pointer;">LANJUT</button>
            </div>

            <div style="text-align: center; margin-top: 40px; border-top: 1px solid #222; padding-top: 20px;">
                <button onclick="pemicuResetPaksa()" 
                    style="background: none; border: 1px solid #444; color: #666; padding: 8px 15px; border-radius: 5px; font-size: 0.75rem; cursor: pointer;">
                    RESET PERMAINAN SECARA PAKSA
                </button>
            </div>
        </div>
    </section>
</div>

    let timerInterval;
    let pemainData = JSON.parse(localStorage.getItem('ww_pemain')) || [];

    const phaseData = [

        { id: 27, name: 'Zombie', team: 'netral', active: false, qty: 1 },
        { id: 28, name: 'Pencuri', team: 'netral', active: false, qty: 1 },
        { id: 29, name: 'Teroris', team: 'netral', active: false, qty: 1 },
        { id: 30, name: 'Psikopat', team: 'netral', active: false, qty: 1 },
        { id: 31, name: 'Joker', team: 'netral', active: false, qty: 1 }
    ];

    let gachaTimer;
    let isRolling = false;
    let visualPool = []; 
    let shuffledPool = [];

    const roleDescriptions = {

    };

    // ====== FUNGSI CUSTOM NOTIFIKASI (TOAST BERSENI) ======
    function tunjukkanNotif(pesan, tipe = "info") {
        const toast = document.getElementById("custom-toast");
        const msgEl = document.getElementById("toast-message");
        const iconEl = document.getElementById("toast-icon");

        toast.className = "";
        
        if (tipe === "success") {
            toast.classList.add("toast-success");
            iconEl.innerText = "🟢";
        } else if (tipe === "danger") {
            toast.classList.add("toast-danger");
            iconEl.innerText = "💀";
        } else {
            toast.classList.add("toast-info");
            iconEl.innerText = "🔔";
        }

        msgEl.innerText = pesan;
        toast.classList.add("show");

        setTimeout(() => {
            toast.classList.remove("show");
        }, 4000);
    }

    function pemicuResetPaksa() {
        if (confirm("Reset paksa seluruh permainan?")) {
            resetGameToMenu();
            tunjukkanNotif("Permainan berhasil di-reset paksa ke awal!", "danger");
        }
    }

    function mulaiPermainan() {
        document.getElementById('play-setup').style.display = 'none';
        document.getElementById('game-controller').style.display = 'block';
        
        pemainData.forEach(p => p.votes = 0);
        updatePhaseUI();
        tunjukkanNotif("Permainan Hari ke-1 Dimulai!", "success");
    }

    function updatePhaseUI() {
        const phase = phaseData[currentPhaseIndex];
        const notifBox = document.getElementById('game-notif');
        
        document.getElementById('game-phase').innerText = `HARI ${gameDay} - ${phase.title}`;
        document.getElementById('notif-text').innerText = phase.notif;
        notifBox.style.borderLeftColor = phase.color;

        const pemainHidup = pemainData.filter(p => !p.isDead).length;
        document.getElementById('live-player-count').innerText = `Sisa Hidup: ${pemainHidup}`;

        clearInterval(timerInterval);
        if (phase.time > 0) {
            startTimer(phase.time);
        } else {
            document.getElementById('game-timer').innerText = "--:--";
        }

        renderActionArea();
    }

    function startTimer(seconds) {
        let t = seconds;
        const display = document.getElementById('game-timer');
        
        timerInterval = setInterval(() => {
            let mins = Math.floor(t / 60);
            let secs = t % 60;
            display.innerText = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
            
            if (--t < 0) {
                clearInterval(timerInterval);
                display.innerText = "WAKTU HABIS!";
                tunjukkanNotif("Waktu fase ini telah berakhir!", "info");
            }
        }, 1000);
    }

                } else if (roleLabel !== "Belum Ada") {

                // Kondisi: Jika fase VOTING maka tampilkan saklar angka, jika DISKUSI PAGI maka sembunyikan (display: none)
                const gachaVoteStyle = (currentTitle === "VOTING") ? "display: flex;" : "display: none;";

                area.innerHTML += `
                    <div class="item-row" style="display: flex; flex-direction: column; padding: 12px; margin-bottom: 8px; background: #1a1a1a; border-radius: 10px; ${isDeadStyle}">
                        
                        <div style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
                            <div style="text-align: left; flex: 1; padding-right: 5px;">
                                <strong style="display: block; font-size: 1.05rem; color:${p.isDead ? '#666':'#fff'}">${p.nama} ${p.isDead ? '💀' : ''}</strong>
                                <div onclick="bukaFormEditPeran(${i})" style="font-size:0.75rem; cursor:pointer; margin-top:2px; display:inline-block; border-bottom:1px dashed #555;" title="Klik untuk ubah peran">
                                    ${revealStatus}

                "Soul Changer", "Penjinak Bom", "Polisi", "Pelacur", "Peramal", 
                "Detektif", "Seer Wolf", "Werewolf", "Bodyguard", "Dokter", 
                "Dukun", "Indigo", "Time Travel", "Zombie", "Psikopat"
            ];

                if (!priorityOrder.includes(roleClean)) return false;
                if (gameDay === 1 && ["Pencuri", "Teroris", "Soul Changer", "Penjinak Bom"].includes(roleClean)) return false;
                if (gameDay > 1 && ["Cupid", "Buronan", "Anak-Anak"].includes(roleClean)) return false;

            });

            pemainAktifMalam.sort((a, b) => {
                const roleA = a.role.replace(/[🟢🔴🔵🟡🟣🟠]/g, '').trim();
                const roleB = b.role.replace(/[🟢🔴🔵🟡🟣🟠]/g, '').trim();
                return priorityOrder.indexOf(roleA) - priorityOrder.indexOf(roleB);
            });

            let opsiKorbanWolf = `<option value="">-- Tidak Ada Korban / Selamat --</option>`;
            pemainData.forEach(p => {
                if (!p.isDead) {

                    <p style="font-size:0.75rem; color:#aaa; margin: 0 0 10px 0;">Pilih warga yang ingin dibunuh malam ini. Korban akan tewas saat tombol LANJUT ditekan.</p>

                const indexAsli = pemainData.findIndex(orig => orig.nama === p.nama);

                    pemainData.forEach((pl, idx) => {
                        if (idx !== indexAsli) {

                            opsiPemain += `<option value="${pl.nama}" ${selectedText}>${pl.nama}</option>`;

                         id="baris-malam-${indexAsli}">
                        
                        <div style="display:flex; justify-content:space-between; width:100%; cursor:pointer;" 
                             onclick="document.getElementById('baris-malam-${indexAsli}').style.opacity='0.3'; document.getElementById('baris-malam-${indexAsli}').style.textDecoration='line-through'">
                            <span><strong>${p.nama}</strong></span>
                            <span style="color:var(--gold); font-size:0.9rem;">${p.role}</span>

        }
    }

    function toggleKematianPemain(index) {
        const p = pemainData[index];
        p.isDead = !p.isDead;
        
        saveData();
        
        const pemainHidup = pemainData.filter(pl => !pl.isDead).length;
        document.getElementById('live-player-count').innerText = `Sisa Hidup: ${pemainHidup}`;

        if (p.isDead) {
            tunjukkanNotif(`${p.nama} sekarang dinyatakan TEWAS (💀).`, "danger");
        } else {
            tunjukkanNotif(`${p.nama} berhasil DIHIDUPKAN kembali!`, "success");
        }

        renderActionArea();
    }

    function changeVote(index, val) {
        if (pemainData[index].votes === undefined) pemainData[index].votes = 0;
        
        let current = pemainData[index].votes;
        pemainData[index].votes = Math.max(0, current + val);

        const el = document.getElementById(`vote-count-${index}`);
        if (el) el.innerText = pemainData[index].votes;
        
        saveData();
    }

    function gameNext() {
        if (phaseData[currentPhaseIndex].title === "MALAM TIBA") {
            eksekusiTargetMalamWerewolf();
        }

        if (currentPhaseIndex < phaseData.length - 1) {
            currentPhaseIndex++;
        } else {
            currentPhaseIndex = 0;
            gameDay++;
            cekTargetBuronanMatiMalam();
        }
        
        renderPemain();
        updatePhaseUI();
    }

    function gamePrev() {
        pemainData.forEach(p => p.votes = 0);
        saveData();

        if (currentPhaseIndex > 0) {
            currentPhaseIndex--;
            updatePhaseUI();
            tunjukkanNotif(`Kembali ke fase ${phaseData[currentPhaseIndex].title}`, "info");
        }
    }

    function saveData() {
        localStorage.setItem('ww_pemain', JSON.stringify(pemainData));
        localStorage.setItem('ww_roles', JSON.stringify(roleMaster));
        updatePemainCountBadge();
    }

    function showPage(pageId) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.main-nav button').forEach(b => b.classList.remove('active'));
        
        document.getElementById(`page-${pageId}`).classList.add('active');
        if(pageId === 'gacha') prepareGacha();
        if(pageId !== 'gacha') {
            document.getElementById(`tab-${pageId}`).classList.add('active');
        }
        if(pageId === 'play' && pemainData.length > 0) {
            const pemainHidup = pemainData.filter(pl => !pl.isDead).length;
            const elLive = document.getElementById('live-player-count');
            if(elLive) elLive.innerText = `Sisa Hidup: ${pemainHidup}`;
        }
    }

    function tambahPemain() {
        const input = document.getElementById('input-nama');
        if (input.value.trim() !== "") {
            pemainData.push({ nama: input.value, role: 'Belum Ada', votes: 0, isDead: false });
            tunjukkanNotif(`${input.value} didaftarkan ke desa.`, "success");
            input.value = "";
            renderPemain();
            saveData();
        }
    }

    function hapusPemain(index) {
        const namaDihapus = pemainData[index].nama;
        pemainData.splice(index, 1);
        tunjukkanNotif(`${namaDihapus} dikeluarkan dari daftar.`, "danger");
        renderPemain();
        saveData();
    }

    function resetRolePemain() {
        if (confirm("Reset semua peran yang didapat pemain? (Nama tidak akan dihapus)")) {
            pemainData.forEach(p => { 
                p.role = 'Belum Ada'; 
                delete p.targetBuronan;
                p.isDead = false;
                p.votes = 0;
            });
            shuffledPool = []; 
            renderPemain(); 
            saveData();     
            
            const gachaDisplay = document.getElementById('gacha-display');
            if (gachaDisplay) gachaDisplay.innerText = "TAP GO!";

            const btnGo = document.getElementById('btn-go');
            if (btnGo) {
                btnGo.innerText = "GO!";
                btnGo.setAttribute('onclick', 'toggleGacha()');
            }

            const detailBox = document.getElementById('role-detail-box');
            if (detailBox) detailBox.style.display = "none";
            
            tunjukkanNotif("Semua pembagian peran dibersihkan!", "danger");
        }
    }

    function updatePemainCountBadge() {
        const badge = document.getElementById('total-pemain-badge');
        if(badge) {
            badge.innerText = pemainData.length;
        }
    }

    function renderPemain() {
        const container = document.getElementById('list-pemain');
        container.innerHTML = "";
        pemainData.forEach((p, i) => {
            container.innerHTML += `
                <li class="item-row" style="display: flex; justify-content: space-between; align-items: center; padding: 15px; margin-bottom: 10px;">
                    <div>
                        <strong style="display: block; margin-bottom: 8px; font-size: 1.1rem;">${p.nama}</strong>
                        <span class="role-badge" style="padding: 4px 10px; display: inline-block;">${p.role}</span>
                    </div>
                    <button class="delete-btn" onclick="hapusPemain(${i})">Hapus</button>
                </li>`;
        });
        updatePemainCountBadge();
    }

    function renderKarakter() {
        let total = 0;
        ['warga', 'wolf', 'netral'].forEach(t => {
            const list = document.getElementById(`${t}-list`);
            list.innerHTML = "";
            roleMaster.filter(r => r.team === t).forEach(role => {
                if (role.active) total += role.qty;

                list.innerHTML += `
                    <div class="role-card" style="border-left-color: var(--${t})">
                        <span onclick="showRoleInfo('${role.name}')" style="cursor: help; text-decoration: underline dotted #555;">
                            ${role.name}
                        </span>
                        <div class="controls">
                            <input type="number" class="qty-input" value="${role.qty}" min="1" max="10" onchange="updateQty(${role.id}, this.value)">
                            <button class="btn-toggle ${role.active ? 'btn-on' : 'btn-off'}" onclick="toggleRole(${role.id})">
                                ${role.active ? 'ON' : 'OFF'}
                            </button>
                        </div>
                    </div>`;
            });
        });

        const totalDisplay = document.getElementById('total-peran-aktif');
        if (totalDisplay) {
            totalDisplay.innerText = `Total Peran Aktif: ${total}`;
            if (total !== pemainData.length) {
                totalDisplay.style.borderColor = "var(--accent-red)";
                totalDisplay.style.color = "var(--accent-red)";
            } else {
                totalDisplay.style.borderColor = "var(--gold)";
                totalDisplay.style.color = "var(--gold)";
            }
        }
    }

    function showRoleInfo(roleName) {
        const modal = document.getElementById('roleModal');
        const titleEl = document.getElementById('modalTitle');
        const descEl = document.getElementById('modalDesc');

        const key = Object.keys(roleDescriptions).find(k => roleName.includes(k));
        const deskripsi = roleDescriptions[key] || "Deskripsi peran belum tersedia.";

        titleEl.innerText = roleName;
        descEl.innerText = deskripsi;
        modal.style.display = "block";
    }

    function closeModal() {
        const modal = document.getElementById('roleModal');
        modal.style.display = "none";
    }

    function resetGameToMenu() {
        document.getElementById('play-setup').style.display = 'block';
        document.getElementById('game-controller').style.display = 'none';

        gameDay = 1;
        currentPhaseIndex = 0;
        clearInterval(timerInterval);
        document.getElementById('game-timer').innerText = "05:00";

        pemainData.forEach(p => { p.isDead = false; delete p.targetBuronan; p.votes = 0; });
        saveData(); 
        renderPemain();
        renderActionArea();
    }

    window.onclick = function(event) {
        const modal = document.getElementById('roleModal');
        if (event.target == modal) {
            closeModal();
        }
    }

    function toggleRole(id) {
        const role = roleMaster.find(r => r.id === id);
        role.active = !role.active;
        renderKarakter();
        saveData();
    }

    function updateQty(id, val) {
        const role = roleMaster.find(r => r.id === id);
        role.qty = parseInt(val);
        saveData();
        renderKarakter();
    }

    function shuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    function prepareGacha() {
        const pendingPlayers = pemainData.filter(p => p.role === 'Belum Ada');
        
        if (pendingPlayers.length === 0) {
            document.getElementById('gacha-target-name').innerText = "Semua sudah dapat peran!";
            document.getElementById('btn-go').disabled = true;
            return;
        }

        visualPool = [];
        roleMaster.filter(r => r.active).forEach(r => {
            for(let i = 0; i < r.qty; i++) {
                visualPool.push(r.name);
            }
        });

        if (shuffledPool.length === 0) {
            let tempPool = [];
            roleMaster.filter(r => r.active).forEach(r => {
                const usedCount = pemainData.filter(p => p.role === r.name).length;
                for(let i = 0; i < (r.qty - usedCount); i++) {
                    tempPool.push(r.name);
                }
            });
            shuffledPool = shuffleArray(tempPool);
        }

        if (shuffledPool.length === 0) {
            tunjukkanNotif("Stok karakter habis! Aktifkan lebih banyak karakter di menu KARAKTER.", "danger");
            return;
        }

        document.getElementById('gacha-target-name').innerText = "Gilirannya: " + pendingPlayers[0].nama;
        document.getElementById('gacha-progress').innerText = `Tersisa ${pendingPlayers.length} pemain lagi.`;
    }

    function toggleGacha() {
        const btn = document.getElementById('btn-go');
        const display = document.getElementById('gacha-display');
        const detailBox = document.getElementById('role-detail-box');

        if (!isRolling) {
            const pendingPlayers = pemainData.filter(p => p.role === 'Belum Ada');
            if (pendingPlayers.length === 0) return tunjukkanNotif("Semua pemain sudah punya peran!", "info");
            
            prepareGacha();
            if (shuffledPool.length === 0) return;

            isRolling = true;
            btn.innerText = "STOP!";
            detailBox.style.display = "none";

            gachaTimer = setInterval(() => {
                display.innerText = visualPool[Math.floor(Math.random() * visualPool.length)];
            }, 60);
        } else {
            clearInterval(gachaTimer);
            isRolling = false;
            btn.innerText = "NEXT PLAYER";
            btn.setAttribute('onclick', 'resetForNext()');

            const hasilRole = shuffledPool.shift(); 
            display.innerText = hasilRole;
            
            const playerIndex = pemainData.findIndex(p => p.role === 'Belum Ada');
            pemainData[playerIndex].role = hasilRole;

            showRoleDetail(hasilRole);
            renderPemain();
            saveData();
        }
    }

    function showRoleDetail(roleName) {
        const detailBox = document.getElementById('role-detail-box');
        const nameEl = document.getElementById('detail-role-name');
        const descEl = document.getElementById('detail-role-desc');

        nameEl.innerText = roleName;
        const key = Object.keys(roleDescriptions).find(k => roleName.includes(k));
        descEl.innerText = roleDescriptions[key] || "Deskripsi peran belum tersedia.";
        detailBox.style.display = "block";
    }

    function resetForNext() {
        const btn = document.getElementById('btn-go');
        const display = document.getElementById('gacha-display');
        const detailBox = document.getElementById('role-detail-box');

        btn.innerText = "GO!";
        btn.setAttribute('onclick', 'toggleGacha()');
        display.innerText = "TAP GO!";
        detailBox.style.display = "none";
        prepareGacha();
    }

    function bukaFormEditPeran(index) {
        const formBox = document.getElementById(`form-edit-peran-${index}`);
        const selectPeran = document.getElementById(`select-peran-${index}`);
        const selectTarget = document.getElementById(`select-target-${index}`);
        const p = pemainData[index];

        if (!formBox || !selectPeran) return;

        selectPeran.innerHTML = `<option value="Belum Ada">Belum Ada Peran</option>`;
        roleMaster.filter(r => r.active).forEach(r => {
            const selectedAttr = p.role === r.name ? 'selected' : '';
            selectPeran.innerHTML += `<option value="${r.name}" ${selectedAttr}>${r.name}</option>`;
        });

        if (selectTarget) {
            selectTarget.innerHTML = `<option value="">-- Tanpa Target --</option>`;
            pemainData.forEach((player, pIdx) => {
                if (pIdx !== index) {
                    const selectedTargetAttr = p.targetBuronan === player.nama ? 'selected' : '';
                    selectTarget.innerHTML += `<option value="${player.nama}" ${selectedTargetAttr}>${player.nama}</option>`;
                }
            });
        }

        formBox.style.display = "block";
        cekKebutuhanTarget(index);
    }

    function cekKebutuhanTarget(index) {
        const selectPeran = document.getElementById(`select-peran-${index}`);
        const boxTarget = document.getElementById(`box-target-${index}`);
        
        if (!selectPeran || !boxTarget) return;
        const peranTerpilih = selectPeran.value;
        
        if (peranTerpilih.includes("Buronan") || peranTerpilih.includes("Pencuri")) {
            boxTarget.style.display = "block";
        } else {
            boxTarget.style.display = "none";
        }
    }

    function tutupFormEditPeran(index) {
        const formBox = document.getElementById(`form-edit-peran-${index}`);
        if (formBox) formBox.style.display = "none";
    }

    function simpanPeranManual(index) {
        const selectPeran = document.getElementById(`select-peran-${index}`);
        const selectTarget = document.getElementById(`select-target-${index}`);
        const boxTarget = document.getElementById(`box-target-${index}`);
        const p = pemainData[index];

        if (!selectPeran) return;
        p.role = selectPeran.value;

        if (boxTarget && boxTarget.style.display === "block" && selectTarget) {
            if (selectTarget.value !== "") {
                p.targetBuronan = selectTarget.value;
            } else {
                delete p.targetBuronan;
            }
        } else {
            delete p.targetBuronan;
        }

        saveData();
        renderActionArea();
        renderPemain();
        tunjukkanNotif(`Peran ${p.nama} berhasil diubah!`, "success");
    }

    function cekTargetBuronanMatiMalam() {
        let adaPerubahan = false;
        let pesanNotif = "";

        pemainData.forEach((p) => {
            if (!p.isDead && p.role.includes("Buronan") && p.targetBuronan) {
                const dataTarget = pemainData.find(t => t.nama === p.targetBuronan);
                if (dataTarget && dataTarget.isDead) {
                    p.role = "Warga Biasa 🟢";
                    delete p.targetBuronan;
                    adaPerubahan = true;
                    pesanNotif += `Target rahasia ${p.nama} tewas! Dia jadi Warga Biasa. `;
                }
            }
        });

        if (adaPerubahan) {
            saveData();
            renderPemain();
            renderActionArea();
            tunjukkanNotif(`[LOG HOST]: ${pesanNotif}`, "info");
        }
    }

    function simpanTargetMalamManual(indexPemain, namaTarget) {
        if (namaTarget !== "") {
            pemainData[indexPemain].targetBuronan = namaTarget;
        } else {
            delete pemainData[indexPemain].targetBuronan;
        }
        saveData();
        tunjukkanNotif("Target malam berhasil dikunci.", "success");
    }

    function eksekusiTargetMalamWerewolf() {
        const selectWolf = document.getElementById('select-target-werewolf');
        if (!selectWolf) return;

        const namaKorban = selectWolf.value;
        if (namaKorban !== "") {
            const indexKorban = pemainData.findIndex(p => p.nama === namaKorban);
            if (indexKorban !== -1 && !pemainData[indexKorban].isDead) {
                pemainData[indexKorban].isDead = true;
                saveData();
                alert(`[KORBAN MALAM]: ${namaKorban} telah dibunuh oleh Werewolf semalam.`);
                
                renderActionArea();
            }
        }
    }

    renderKarakter();
    renderPemain();
    updatePemainCountBadge();
    
    if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js')
      .then(() => console.log("Aplikasi Siap Offline!"))
      .catch((err) => console.log("Gagal PWA:", err));
  }
</script>

<div id="roleModal" style="display:none; position:fixed; z-index:1000; left:0; top:0; width:100%; height:100%; background:rgba(0,0,0,0.85); backdrop-filter: blur(5px);">
    <div style="background:#1a1a1a; margin: 15% auto; padding: 20px; border: 2px solid var(--gold); width: 80%; max-width: 400px; border-radius: 15px; box-shadow: 0 0 30px rgba(212, 175, 55, 0.3); position: relative; animation: modalSlide 0.3s;">
        <span onclick="closeModal()" style="position:absolute; right:15px; top:10px; color:#666; font-size:24px; cursor:pointer;">&times;</span>
        <h3 id="modalTitle" style="color:var(--gold); border-bottom: 1px solid #333; padding-bottom: 10px; margin-top: 0;"></h3>
        <p id="modalDesc" style="color:#ccc; line-height:1.6; font-size:1rem; text-align: justify;"></p>
        <button onclick="closeModal()" style="width:100%; background:var(--accent-red); color:white; border:none; padding:10px; border-radius:5px; font-weight:bold; cursor:pointer; margin-top:10px;">MENGERTI</button>
    </div>
</div>

<style>
@keyframes modalSlide {
    from { transform: translateY(-50px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
}
</style>
